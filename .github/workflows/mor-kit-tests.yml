name: mor-kit plugin tests

on:
  push:
    paths:
      - 'plugins/mor-kit/**'
      - '.github/workflows/mor-kit-tests.yml'
  pull_request:
    paths:
      - 'plugins/mor-kit/**'
      - '.github/workflows/mor-kit-tests.yml'

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install jq

      - name: Make scripts executable
        run: |
          chmod +x plugins/mor-kit/scripts/*.sh
          chmod +x plugins/mor-kit/scripts/lib/*.sh || true
          chmod +x plugins/mor-kit/hooks/*.sh
          chmod +x plugins/mor-kit/tests/*.sh

      - name: Run all tests
        env:
          CLAUDE_PLUGIN_ROOT: ${{ github.workspace }}/plugins/mor-kit
        run: bash plugins/mor-kit/tests/run-all.sh
