name: morkit plugin tests

on:
  push:
    paths:
      - 'plugins/morkit/**'
      - '.github/workflows/morkit-tests.yml'
  pull_request:
    paths:
      - 'plugins/morkit/**'
      - '.github/workflows/morkit-tests.yml'

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install jq

      # srs-to-jira's Python suite guards things a shell test cannot: that a refused
      # approval sends zero requests, that the token never reaches an error message,
      # that a re-run creates no tickets. Without the interpreter and pydantic here,
      # test-srs-to-jira.sh skips and those guarantees go unchecked — which is exactly
      # how a security check rots into decoration.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python test deps
        run: python -m pip install --quiet -r plugins/morkit/requirements.txt

      - name: Make scripts executable
        run: |
          chmod +x plugins/morkit/scripts/*.sh
          chmod +x plugins/morkit/scripts/lib/*.sh || true
          chmod +x plugins/morkit/hooks/*.sh
          chmod +x plugins/morkit/tests/*.sh

      - name: Run all tests
        env:
          CLAUDE_PLUGIN_ROOT: ${{ github.workspace }}/plugins/morkit
        run: bash plugins/morkit/tests/run-all.sh
