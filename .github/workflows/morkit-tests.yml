name: morkit plugin tests

on:
  push:
    paths:
      - 'plugins/morkit/**'
      - '.github/workflows/morkit-tests.yml'
  pull_request:
    paths:
      - 'plugins/morkit/**'
      - '.github/workflows/morkit-tests.yml'

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install jq

      - name: Make scripts executable
        run: |
          chmod +x plugins/morkit/scripts/*.sh
          chmod +x plugins/morkit/scripts/lib/*.sh || true
          chmod +x plugins/morkit/hooks/*.sh
          chmod +x plugins/morkit/tests/*.sh

      - name: Run all tests
        env:
          CLAUDE_PLUGIN_ROOT: ${{ github.workspace }}/plugins/morkit
        run: bash plugins/morkit/tests/run-all.sh
